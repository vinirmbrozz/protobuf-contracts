version: v2
# The buf module roots at proto/, so a file's directory path equals its package
# (e.g. proto/protobuf/transaction/v1 -> package protobuf.transaction.v1). With
# that + version suffixes, the full STANDARD lint set passes with no exceptions.
modules:
  - path: proto
    name: buf.build/protobuf/contracts
deps:
  - buf.build/bufbuild/protovalidate
lint:
  use:
    - STANDARD
  enum_zero_value_suffix: _UNSPECIFIED
breaking:
  use:
    - FILE
