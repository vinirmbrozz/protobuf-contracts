version: v1
name: buf.build/truther/contracts
deps:
  - buf.build/bufbuild/protovalidate
lint:
  use:
    - DEFAULT
  except:
    # Existing fields use camelCase (isAllowed, cardId, etc.) — tracked for migration in ROD-14.
    # All NEW fields must use snake_case per the versioning policy.
    - FIELD_LOWER_SNAKE_CASE
    # We don't suffix packages with a version number (v1, v2) until the first breaking change.
    - PACKAGE_VERSION_SUFFIX
  enum_zero_value_suffix: _UNSPECIFIED
breaking:
  use:
    - FILE
  ignore_unstable_packages: false
