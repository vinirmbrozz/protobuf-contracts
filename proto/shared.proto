syntax = "proto3";

// Shared DTO types reused across contracts. Mirrors the Go
// `internal/application/contracts/shared` package in data-rudder-provider.
// This file is NOT bound to any Kafka topic — it is registered in the Schema
// Registry as a library subject and referenced by the contracts that import it.
package protobuf.shared;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/vinirmbrozz/protobuf-contracts/gen/go/shared";

// PixKeyType — valid Pix key types (source validated the string against this set).
enum PixKeyType {
  PIX_KEY_TYPE_UNSPECIFIED = 0;
  PIX_KEY_TYPE_CPF = 1;
  PIX_KEY_TYPE_CNPJ = 2;
  PIX_KEY_TYPE_EMAIL = 3;
  PIX_KEY_TYPE_PHONE = 4;
  PIX_KEY_TYPE_RANDOM = 5;
}

message Address {
  string zip_code = 1;
  string city = 2;
  string street_name = 3;
  string street_number = 4;
  string complement = 5;
  string state = 6;
  string country = 7;
}

message RegistrationData {
  string name = 1;
  string email = 2;
  google.protobuf.Timestamp datetime_account_create = 3;
  string phone_number = 4;
  string birthdate = 5;  // date-only (YYYY-MM-DD) in source; kept as string
  string doc_type = 6;
  string doc = 7;
  Address address = 8;
}

message BankingData {
  string account_type = 1;
  string institution_name = 2;
  string bank_code = 3;
  string branch_code = 4;
  string branch_name = 5;
  string account_id = 6;
  string country = 7;
  google.protobuf.Timestamp account_create_date = 8;
  google.protobuf.Timestamp account_last_update_date = 9;
}
