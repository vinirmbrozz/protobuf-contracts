version: v1

# Local plugins are used so CI doesn't require BSR authentication.
# To switch to BSR-hosted remote plugins, replace each `name:` entry with
# the corresponding `remote: buf.build/...` plugin and remove the local
# install steps from CI workflows.
#
# Strategy A (ROD-22): each language plugin emits to both gen/<lang>/ (canonical
# record, never deleted) and sdk/<lang>/ (publishable SDK embedding). Running
# `buf generate` keeps both trees in sync automatically.
plugins:
  # --- Go ---
  # Canonical codegen record
  - name: go
    out: gen/go
    opt:
      - paths=source_relative
  # SDK embedding (Strategy A — ROD-22)
  - name: go
    out: sdk/go
    opt:
      - paths=source_relative

  # --- TypeScript (ts-proto) — requires: npm install ts-proto ---
  # Canonical codegen record
  - name: ts_proto
    path: node_modules/ts-proto/protoc-gen-ts_proto
    out: gen/typescript
    opt:
      - esModuleInterop=true
      - outputServices=false
      - oneof=unions
      - outputTypeRegistry=true
  # SDK embedding (Strategy A — ROD-22)
  - name: ts_proto
    path: node_modules/ts-proto/protoc-gen-ts_proto
    out: sdk/node/src/generated
    opt:
      - esModuleInterop=true
      - outputServices=false
      - oneof=unions
      - outputTypeRegistry=true

  # --- Node.js CommonJS — requires protoc-gen-js on PATH ---
  # Canonical codegen record only; Node SDK uses the ts_proto output above.
  - name: js
    out: gen/node
    opt:
      - import_style=commonjs
      - binary

  # --- Python — built-in protoc plugin ---
  # Canonical codegen record only. The publishable Python SDK is generated by a
  # separate step with --include-imports (buf.gen.pyimports.yaml) so it embeds
  # buf/validate/*_pb2.py and is self-contained (protovalidate ships no such pkg).
  - name: python
    out: gen/python
