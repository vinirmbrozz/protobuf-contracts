name: CI — lint, breaking, SDK tests, cross-language interop

on:
  push:
    paths:
      - 'proto/**'
      - 'buf.yaml'
      - 'buf.gen.yaml'
      - 'sdk/**'
      - 'interop/**'
      - 'scripts/**'
      - '.github/workflows/buf-ci.yml'
  pull_request:
    paths:
      - 'proto/**'
      - 'buf.yaml'
      - 'buf.gen.yaml'
      - 'sdk/**'
      - 'interop/**'
      - 'scripts/**'
      - '.github/workflows/buf-ci.yml'

jobs:
  # ── 1. buf lint ──────────────────────────────────────────────────────────
  buf-lint:
    name: buf lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-action@v1
        with:
          version: '1.70.0'
          setup_only: true
      - name: Resolve buf deps (protovalidate)
        run: buf dep update
      - run: buf lint

  # ── 2. buf breaking (vs main) ────────────────────────────────────────────
  buf-breaking:
    name: buf breaking
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Ensure local main ref for breaking check
        run: git fetch origin main:main
      - uses: bufbuild/buf-action@v1
        with:
          version: '1.70.0'
          setup_only: true
      - name: Resolve buf deps (protovalidate)
        run: buf dep update
      - run: buf breaking --against '.git#branch=main'

  # ── 3. SDK unit tests (isolated, mock SR — no infra) ─────────────────────
  sdk-go:
    name: sdk/go unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: go test
        working-directory: sdk/go
        run: go test ./...

  sdk-node:
    name: sdk/node unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: npm test
        working-directory: sdk/node
        run: npm install && npm test

  sdk-python:
    name: sdk/python unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: pytest
        run: |
          pip install sdk/python/ pytest
          python -m pytest sdk/python/tests/test_serde_unit.py -q

  # ── 4. Cross-language interop against a REAL Schema Registry ─────────────
  interop:
    name: cross-language interop (real SR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: bufbuild/buf-action@v1
        with:
          version: '1.70.0'
          setup_only: true
      - name: Vendor proto deps (protovalidate) for SR references
        run: |
          buf dep update
          buf export . -o /tmp/protoexport

      - name: Start Kafka + Schema Registry
        run: docker compose up -d

      - name: Wait for Schema Registry
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8081/subjects >/dev/null; then echo "SR ready"; exit 0; fi
            sleep 2
          done
          echo "Schema Registry did not become ready"; docker compose logs --tail=50; exit 1

      - name: Build sdk/node
        working-directory: sdk/node
        run: npm install && npm run build

      - name: Install sdk/python
        run: pip install sdk/python/

      - name: Install interop deps
        working-directory: interop
        run: npm install

      - name: Register schemas (the only writer to SR)
        run: python scripts/register_schemas.py
        env:
          SCHEMA_REGISTRY_URL: http://localhost:8081
          PROTO_EXPORT_DIR: /tmp/protoexport

      - name: Run cross-language interop
        run: node interop/orchestrate.mjs
        env:
          SCHEMA_REGISTRY_URL: http://localhost:8081
          PYTHON: python

      - name: Schema Registry logs (on failure)
        if: failure()
        run: docker compose logs --tail=100
