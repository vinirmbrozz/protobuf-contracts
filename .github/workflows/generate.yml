name: Generate SDKs via buf

# Runs only when proto sources or buf config change.
# The auto-commit step uses [skip ci] so the bot's own push does not re-trigger.
on:
  push:
    paths:
      - 'proto/**'
      - 'buf.gen.yaml'
      - 'buf.gen.pyimports.yaml'
      - 'buf.yaml'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so the auto-commit action can push back.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      # Install buf CLI (same version as buf-ci.yml).
      - uses: bufbuild/buf-action@v1
        with:
          version: '1.70.0'
          setup_only: true

      # protoc — needed by buf's built-in `name: python` plugin (calls protoc --python_out).
      - name: Install protoc
        run: sudo apt-get update -qq && sudo apt-get install -y protobuf-compiler

      # protoc-gen-go — needed by the `name: go` plugin in buf.gen.yaml.
      - name: Install protoc-gen-go
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.31.0
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      # ts-proto (protoc-gen-ts_proto) and protoc-gen-js live in devDependencies.
      - name: Install buf plugin dependencies
        run: |
          npm install
          echo "$(npm root)/.bin" >> $GITHUB_PATH

      # Resolve remote deps (protovalidate) — writes buf.lock and downloads modules.
      - name: Resolve buf deps
        run: buf dep update

      # Single source of truth: buf.gen.yaml drives all code generation.
      - name: Run buf generate
        run: buf generate

      # Python SDK: --include-imports also emits buf/validate/*_pb2.py (non-WKT)
      # so the SDK is self-contained; WKTs (google/*) come from the runtime.
      - name: Generate Python SDK (with imports)
        run: buf generate --include-imports --template buf.gen.pyimports.yaml

      # Embed the FileDescriptorSet so the Node SDK can resolve message indexes
      # generically at runtime (ts-proto, unlike Go/Python, embeds no descriptor).
      # Regenerated here whenever proto/ changes — no per-contract code.
      - name: Embed descriptor set (Node SDK)
        run: |
          buf build -o /tmp/desc.binpb
          {
            echo "// Code generated from 'buf build' — DO NOT EDIT."
            echo "// FileDescriptorSet for ALL contracts; the SDK derives each message's"
            echo "// index (Confluent msg-index) from this at runtime."
            echo "export const DESCRIPTOR_SET_B64 ="
            echo "  \"$(base64 -w0 /tmp/desc.binpb)\";"
          } > sdk/node/src/generated/descriptor-set.ts

      # Commit gen/ + sdk/ back to the branch.  [skip ci] breaks the push loop.
      - name: Commit generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(gen): regenerar via buf [skip ci]"
          file_pattern: gen sdk buf.lock
